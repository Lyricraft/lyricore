name: AutoPublishToGitHubMaven

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: 置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # 核心妙诀在此 ↓
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}
          # 开覆写之门 ↑

      - name: 授 gradlew 行权
        run: chmod +x ./gradlew

      # 径行构建发布，新包自覆旧包
      - name: 建置与布包
        run: ./gradlew build publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # （可选项）清除缓存
      - name: 涤构建缓存
        uses: actions/cache/clean@v2
        if: always()